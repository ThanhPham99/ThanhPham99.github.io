<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Monogatari series</title>
    <style>
        html {
            font-family: 'Courier New', Courier, monospace;
        }
        
        h1,
        h2,
        h3,
        p {
            margin: 0;
        }
        
        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            background: rgb(163, 163, 163);
            background: radial-gradient(circle, rgba(163, 163, 163, 1) 0%, rgba(255, 255, 255, 1) 100%, rgba(0, 0, 0, 1) 100%);
        }
        
        .best-girls,
        .trash-girls {
            width: 500px;
            background: #00000041;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }
        
        h2 {
            background: #000000;
            color: rgb(255, 177, 31);
            padding: 1rem 2rem;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        
        .char-container {
            display: flex;
            background: #000000;
            width: 80%;
            margin-top: 1rem;
            box-sizing: border-box;
            align-items: center;
            color: #ffffff;
            padding: 0.5rem 1rem;
        }
        
        .char-container:last-child {
            margin-bottom: 1rem;
        }
        
        .char-container p {
            flex-grow: 1;
            padding-left: 0.5rem;
        }
        
        .char-container h3 {
            font-size: 2.5rem;
            padding-right: 0.5rem;
        }
        
        .char-container img {
            width: 50px;
        }
        .title{
            flex-basis: 100%;
            background: #000000;
            padding: 1rem 0;
            color: #ffffff;
            text-align: center;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <div class="title">Top 5 best & trash girls monogatari series</div>
    <div class="best-girls">
        <h2>Best Girls</h2>
        <div class="char-container">
            <h3>1</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/8/81/Mayoi_Owari3.jpg/revision/latest/top-crop/width/200/height/150?cb=20180103101821" alt="Hachikuji Mayoi">
            <p>Hachikuji Mayoi</p>
        </div>
        <div class="char-container">
            <h3>2</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/b/b9/Shinobu.png/revision/latest/top-crop/width/200/height/150?cb=20161221045011" alt="Kiss-Shot">
            <p>Kiss-Shot(Shinobu Oshino)</p>
        </div>
        <div class="char-container">
            <h3>3</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/a/ab/Yotsugi_profile.jpg/revision/latest/scale-to-width-down/350?cb=20120323005526" alt="Yotsugi Ononoki">
            <p>Yotsugi Ononoki</p>
        </div>
        <div class="char-container">
            <h3>4</h3>

            <p>Ougi Oshino</p>
        </div>
        <div class="char-container">
            <h3>5</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/d/d2/Izuko_gaen.jpg/revision/latest/scale-to-width-down/350?cb=20130805032811" alt="Izuko Gaen">
            <p>Izuko Gaen</p>
        </div>
    </div>
    <div class="trash-girls">
        <h2>Trash Girls</h2>
        <div class="char-container">
            <h3>1</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/1/13/Nadeko1.png/revision/latest/scale-to-width-down/350?cb=20161115034306" alt="Nadeko Sengoku">
            <p>Nadeko Sengoku</p>
        </div>
        <div class="char-container">
            <h3>2</h3>

            <h3>3</h3>

            <h3>4</h3>

            <p>Hitagi Senjougahara</p>
        </div>
        <div class="char-container">
            <h3>5</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/1/17/Sodachi_profile.png/revision/latest/scale-to-width-down/350?cb=20170424065922" alt="Sodachi Oikura">
            <p>Sodachi Oikura</p>

    </div>
</body>

</html>
