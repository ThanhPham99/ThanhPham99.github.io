<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        p {
            margin: 0;
        }
        
        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            background-image: url('./firework.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 300%;
        }
        
        #main-block {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #block {
            padding: 3%;
            border: 5px solid aqua;
            border-radius: 1rem;
            margin: 1rem;
            background: rgba(0, 0, 0, 0.685);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .block-2 {
            padding: 1rem;
            border: 3px solid rgb(255, 255, 255);
            margin: 1rem;
            background: rgb(0, 0, 0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #happynewyear {
            font-size: 150%;
            font-weight: bolder;
            border-color: coral;
        }
    </style>
</head>

<body>
    <div id="main-block">
        <div id="block">
            <div class="block-2">
                <p id="days"></p>
            </div>
            <p>days</p>
        </div>
        <div id="block">
            <div class="block-2">
                <p id="hours"></p>
            </div>
            <p>hours</p>
        </div>
        <div id="block">
            <div class="block-2">
                <p id="mins"></p>
            </div>
            <p>mins</p>
        </div>
        <div id="block">
            <div class="block-2">
                <p id="secs"></p>
            </div>
            <p>secs</p>
        </div>
    </div>
    <p id="happynewyear"></p>
    <script>
        var x = setInterval(function() {

            var thisTime = new Date().getTime(); //get current time (msecs)

            var Tet = new Date("Jan 31, 2019 11:15:00").getTime(); //get Tet time

            var countDown = Tet - thisTime; //get count time

            var days = Math.floor(countDown / (24 * 60 * 60 * 1000));
            var hours = Math.floor((countDown % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            var mins = Math.floor((countDown % (60 * 60 * 1000)) / (60 * 1000));
            var secs = Math.floor((countDown % (60 * 1000)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("mins").innerHTML = mins;
            document.getElementById("secs").innerHTML = secs;
            if (countDown < 0) {
                clearInterval(x);
                document.getElementById("main-block").style.display = "none";
                document.getElementById("happynewyear").innerHTML = "Chúc mừng năm mới!";
            }
        }, 1000);
    </script>
</body>

</html>
