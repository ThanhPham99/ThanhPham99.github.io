<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Monogatari series</title>
    <style>
        html {
            font-family: 'Courier New', Courier, monospace;
        }
        
        h1,
        h2,
        h3,
        p {
            margin: 0;
        }
        
        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgb(35, 36, 40);
            background: radial-gradient(circle, rgba(35, 36, 40, 1) 0%, rgba(0, 0, 0, 1) 100%, rgba(0, 0, 0, 1) 100%);
        }
        
        .best-girls,
        .trash-girls {
            width: 500px;
            background: #00000041;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }
        
        h2 {
            background: #000000;
            color: rgb(255, 177, 31);
            padding: 1rem 2rem;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        
        .char-container {
            display: flex;
            background: #000000;
            width: 80%;
            margin: 1rem;
            box-sizing: border-box;
            align-items: center;
            color: #ffffff;
            padding: 0.5rem 1rem;
        }
        
        .char-container p {
            flex-grow: 1;
            padding-left: 0.5rem;
        }
        
        .char-container h3 {
            font-size: 2rem;
            padding-right: 0.5rem;
        }
        
        .char-container img {
            width: 40px;
            height: 40px;
        }
    </style>
</head>

<body>
    <div class="best-girls">
        <h2>Best Girls</h2>
        <div class="char-container">
            <h3>1</h3>
            <img src="https://vignette.wikia.nocookie.net/bakemonogatari1645/images/8/81/Mayoi_Owari3.jpg/revision/latest/top-crop/width/200/height/150?cb=20180103101821" alt="">
            <p>Hachikuji Mayoi</p>
        </div>
    </div>
    <div class="trash-girls"></div>
</body>

</html>
